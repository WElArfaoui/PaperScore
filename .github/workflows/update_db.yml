name: Actualizar base de datos de revistas

on:
  schedule:
    - cron: "0 3 1 * *"   # cada día 1 del mes a las 3:00 UTC
  workflow_dispatch:        # también se puede lanzar manualmente desde GitHub

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Descargar CSV de Scimago
        run: |
          curl -L \
            -H "User-Agent: Mozilla/5.0" \
            "https://www.scimagojr.com/journalrank.php?out=xls" \
            -o scimago_raw.csv
          echo "Tamaño del CSV descargado:"
          wc -l scimago_raw.csv

      - name: Generar journal_data.json
        run: python3 build_journal_db.py scimago scimago_raw.csv

      - name: Eliminar CSV temporal
        run: rm scimago_raw.csv

      - name: Commit si hay cambios
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add extension/journal_data.json
          if git diff --cached --quiet; then
            echo "Sin cambios en la base de datos."
          else
            TOTAL=$(python3 -c "import json; d=json.load(open('extension/journal_data.json')); print(len(d))")
            git commit -m "chore: actualizar BD de revistas — ${TOTAL} entradas ($(date '+%Y-%m-%d'))"
            git push
          fi
